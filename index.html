<!DOCTYPE html>
<html>

<head>
    <title>EzyWeb</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Ezy Web Accesibility Tool</h1>

    <p class="intro">
        Helping elderly users and people with cognitive difficulties browse websites more easily.
    </p>
    <input type="text" id="urlInput" placeholder="Paste document" style="width:60%; padding:10px;">
<button onclick="processLink()">Submit</button>


    <div class="buttons">
        <button onclick="increaseFont()">A+</button>
        <button onclick="decreaseFont()">A-</button>
        <button onclick="toggleDark()">Dark Mode</button>
        <button onclick="readText()">Read Aloud</button>
        <button onclick="simplifyText()">Simplify</button>
    </div>

    <div class="box">
        <p id="text">
            Government websites often contain difficult language and confusing layouts that make reading hard.
        </p>
    </div>

    <div class="box">
        <h3>Simplified Version:</h3>
        <p id="simpleText"></p>
    </div>

<script src="script.js"></script>
<script src="server.js"></script>

</body>
</html>
