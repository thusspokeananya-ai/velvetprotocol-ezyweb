<!DOCTYPE html>
<html>
<head>
    <title>EzyWeb</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Ezy Web Accessibility Tool</h1>

<input type="text" id="urlInput" placeholder="Paste URL here" style="width:60%; padding:10px;">
<button onclick="processLink()">Submit</button>

<div class="buttons">
    <button onclick="increaseFont()">A+</button>
    <button onclick="decreaseFont()">A-</button>
    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="readText()">Read Aloud</button>
</div>

<div class="box">
    <h3>Simplified Version:</h3>
    <div id="simpleText"></div>
</div>

<div class="box">
    <h3>Original Text:</h3>
    <p id="text"></p>
</div>

<script src="script.js"></script>

</body>
</html>
